name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# One run per branch; newer pushes cancel older in-flight runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write      # push captured screenshots to the ci-screens branch
  pull-requests: write

jobs:
  build-test:
    name: Build, test & capture
    runs-on: macos-26
    env:
      SCHEME: Terrarium
      PROJECT: Terrarium.xcodeproj
      DERIVED: DerivedData
      BUNDLE_ID: com.tobiasfu.Terrarium
      RESULT_BUNDLE: ${{ github.workspace }}/Test.xcresult
      UITEST_RESULT: ${{ github.workspace }}/UITest.xcresult
      SCREENS_DIR: ${{ github.workspace }}/artifacts/screens
      FEATURE_DIR: ${{ github.workspace }}/artifacts/feature-screens
      SCREENS_BRANCH: ci-screens
      UITEST_ID: TerrariumUITests/FeatureScreenshotTests/testCaptureFeatureScreens

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          APP=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1 || true)
          if [ -n "$APP" ]; then sudo xcode-select -s "$APP"; fi
          xcodebuild -version

      - name: Select simulator
        id: sim
        run: python3 .github/scripts/pick-simulator.py

      - name: Build for testing
        run: |
          xcodebuild build-for-testing \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
            -derivedDataPath "$DERIVED" \
            -only-testing:TerrariumTests \
            -only-testing:"$UITEST_ID" \
            CODE_SIGNING_ALLOWED=NO

      - name: Run tests
        run: |
          set +e
          # Scope to the real unit/integration suite; the default template UI
          # tests (launch-performance, etc.) are slow/flaky on hosted runners and
          # add no coverage — the capture step exercises a real launch instead.
          xcodebuild test-without-building \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
            -derivedDataPath "$DERIVED" \
            -resultBundlePath "$RESULT_BUNDLE" \
            -only-testing:TerrariumTests \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tee test.log
          echo "TEST_RESULT=${PIPESTATUS[0]}" >> "$GITHUB_ENV"
          exit 0

      - name: Capture screenshots & recording
        if: ${{ !cancelled() }}
        env:
          UDID: ${{ steps.sim.outputs.udid }}
          APP_PATH: ${{ github.workspace }}/DerivedData/Build/Products/Debug-iphonesimulator/Terrarium.app
          OUT_DIR: ${{ env.SCREENS_DIR }}
        run: bash .github/scripts/capture-screens.sh

      # Drive the app to the specific feature screens (transport onboarding step
      # + Settings sheet) and pull the named screenshots out of the .xcresult.
      # Best-effort: this never fails the build (the UI test is outside the gated
      # -only-testing:TerrariumTests scope).
      - name: Capture feature screens (UI test)
        if: ${{ !cancelled() }}
        run: |
          set +e
          # Cap a single test so a hang returns control here (and we still
          # exit 0) instead of spinning for the whole job timeout.
          xcodebuild test-without-building \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
            -derivedDataPath "$DERIVED" \
            -resultBundlePath "$UITEST_RESULT" \
            -only-testing:"$UITEST_ID" \
            -test-timeouts-enabled YES \
            -maximum-test-execution-time-allowance 240 \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tee uitest.log
          XCRESULT="$UITEST_RESULT" OUT_DIR="$FEATURE_DIR" \
            python3 .github/scripts/extract-attachments.py
          exit 0

      # Publish the feature screenshots to the ci-screens orphan branch so they
      # render inline in the PR comment. Skipped for fork PRs (read-only token).
      - name: Publish feature screens
        id: screens
        if: ${{ !cancelled() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: bash .github/scripts/publish-screens.sh

      - name: Upload artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: ci-artifacts
          path: |
            artifacts/screens
            artifacts/feature-screens
            Test.xcresult
            UITest.xcresult
          if-no-files-found: warn
          retention-days: 14

      - name: Job summary
        if: ${{ !cancelled() }}
        run: |
          if [ "${TEST_RESULT:-1}" = "0" ]; then STATUS="✅ Passed"; else STATUS="❌ Failed"; fi
          {
            echo "## 🌱 Terrarium CI"
            echo ""
            echo "**Build & test:** $STATUS"
            echo ""
            echo "**Simulator:** ${{ steps.sim.outputs.name }} · iOS ${{ steps.sim.outputs.runtime }}"
            echo ""
            echo "Screenshots, recording, and the .xcresult are attached as the **ci-artifacts** artifact."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Sticky PR comment
        if: ${{ !cancelled() && github.event_name == 'pull_request' }}
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SIM_NAME: ${{ steps.sim.outputs.name }}
          SIM_RUNTIME: ${{ steps.sim.outputs.runtime }}
          SCREENS_SHA: ${{ steps.screens.outputs.screens_sha }}
        run: python3 .github/scripts/pr-comment.py

      - name: Report test status
        if: ${{ !cancelled() }}
        run: |
          echo "Test exit code: ${TEST_RESULT:-1}"
          exit "${TEST_RESULT:-1}"
